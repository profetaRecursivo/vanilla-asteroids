<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <title>ASTEROIDS</title>
    <link rel="stylesheet" href="styles/styles.css" />
  </head>
  <body>
    <div class="home">
      <h1 class="press-start-2p-regular game-title">ASTEROIDS</h1>
      <button type="button" class="press-start-2p-regular" id="play-button">Play Game</button>
    </div>
    <div class="game">
      <div class="hud press-start-2p-regular">
        <div class="hud-main">
          <div class="hud-item hud-item--score">
            <span class="hud-label">Score</span>
            <span class="hud-value" id="score-value">000000</span>
          </div>

          <div class="hud-item">
            <span class="hud-label">Lives</span>
            <span class="hud-value" id="lives-value">3</span>
          </div>

          <div class="hud-item">
            <span class="hud-label">Level</span>
            <span class="hud-value" id="level-value">1</span>
          </div>

          <div class="hud-item hud-item--secondary">
            <span class="hud-label">Asteroids</span>
            <span class="hud-value hud-value--small" id="asteroids-value">10</span>
          </div>
          <!-- estaria maldito que se ponga en rojo y luego diga BOSS INCOMING, luego lo ponemos si nos da el tiempo -->
          <div class="hud-status" id="hud-status">Ready</div>
        </div>
      </div>
      <canvas id="scenario" width="640" height="360"></canvas>
    </div>
  </body>
  <script type="module" src="src/main.js"></script>
</html>
